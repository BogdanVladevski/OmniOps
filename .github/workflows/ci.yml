name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/OmniOps.sln') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore backend solution
        run: dotnet restore backend/OmniOps.sln

      - name: Build backend solution
        run: dotnet build backend/OmniOps.sln --configuration Release --no-restore

      - name: Verify Docker is available for Testcontainers
        run: docker version

      - name: Run backend tests
        run: dotnet test backend/OmniOps.sln --configuration Release --no-build --logger trx --results-directory TestResults

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend unit tests
        working-directory: frontend
        run: |
          npm ci
          npm test -- --ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore

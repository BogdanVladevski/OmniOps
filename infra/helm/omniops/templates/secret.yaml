{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omniops.fullname" . }}-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "omniops.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.databaseUsername | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.databasePassword | quote }}
  DB_CONNECTION_STRING: "Host={{ .Values.config.databaseHost }};Port={{ .Values.config.databasePort }};Database={{ .Values.config.databaseName }};Username={{ .Values.secrets.databaseUsername }};Password={{ .Values.secrets.databasePassword }}"
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
{{- end }}
